<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Forest: Final Clean Build</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #a3b1c6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; touch-action: none; }
        
        /* Elevated Controls */
        #controls { 
            position: absolute; 
            bottom: 180px; /* Raised significantly */
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 100; 
        }
        .row { display: flex; gap: 12px; justify-content: center; }
        .btn { 
            width: 80px; height: 80px; 
            background: rgba(20, 20, 20, 0.6); 
            border: 2px solid rgba(255, 255, 255, 0.2); 
            border-radius: 20px; 
            color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 24px;
            user-select: none;
            backdrop-filter: blur(4px);
        }
        .btn:active { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>

    <div id="controls">
        <div class="row"><div class="btn" id="btn-w">W</div></div>
        <div class="row">
            <div class="btn" id="btn-a">A</div>
            <div class="btn" id="btn-s">S</div>
            <div class="btn" id="btn-d">D</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { BufferGeometryUtils } from 'three/addons/utils/BufferGeometryUtils.js';

        // --- SCENE & CAMERA RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3b1c6); 
        // Fixed Fog: Start further back so the immediate area is crisp
        scene.fog = new THREE.Fog(0xa3b1c6, 100, 3000);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 8000);
        camera.position.set(0, 18, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(1, 2, 1);
        scene.add(sun);

        // --- FOREST FLOOR ---
        const groundGeo = new THREE.PlaneGeometry(10000, 10000);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x2b1d0e, shininess: 0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- TREE GEOMETRY (BOTTOM PIERCE FIX) ---
        function createTreeGeom() {
            const geoms = [];
            
            // The Trunk: Only tall enough to enter the first cone
            const trunkHeight = 65;
            const trunk = new THREE.CylinderGeometry(3, 5, trunkHeight, 8);
            trunk.translate(0, trunkHeight / 2, 0);
            geoms.push(trunk);

            // Overlapping Leafs: Matching the "In each other" look
            const leafData = [
                { r: 42, h: 60, y: 50 },  // Bottom (Pierced by trunk)
                { r: 34, h: 52, y: 85 },  // Significant overlap
                { r: 25, h: 45, y: 115 }, 
                { r: 15, h: 38, y: 140 }
            ];

            leafData.forEach(d => {
                const c = new THREE.ConeGeometry(d.r, d.h, 10);
                c.translate(0, d.y, 0);
                geoms.push(c);
            });

            return BufferGeometryUtils.mergeGeometries(geoms);
        }

        // --- INSTANCING 5000 TREES ---
        const totalTrees = 5000;
        const geometry = createTreeGeom();
        const material = new THREE.MeshPhongMaterial({ color: 0x355E3B, flatShading: true });
        const mesh = new THREE.InstancedMesh(geometry, material, totalTrees);

        const dummy = new THREE.Object3D();
        let validTrees = 0;

        for (let i = 0; i < totalTrees; i++) {
            const x = (Math.random() - 0.5) * 9000;
            const z = (Math.random() - 0.5) * 9000;
            
            // Spawn Protection Check
            if (Math.sqrt(x*x + z*z) < 180) continue;

            dummy.position.set(x, 0, z);
            dummy.rotation.y = Math.random() * Math.PI;
            const s = 0.6 + Math.random() * 1.4;
            dummy.scale.set(s, s, s);
            dummy.updateMatrix();
            mesh.setMatrixAt(validTrees++, dummy.matrix);
        }
        mesh.count = validTrees;
        scene.add(mesh);

        // --- CONTROLS & MOVEMENT ---
        let lon = 0, lat = 0, startX = 0, startY = 0, startLon = 0, startLat = 0;
        document.addEventListener('pointerdown', (e) => {
            if (e.target.closest('#controls')) return;
            startX = e.clientX; startY = e.clientY;
            startLon = lon; startLat = lat;
            document.addEventListener('pointermove', onMove);
        });
        const onMove = (e) => {
            lon = (startX - e.clientX) * 0.15 + startLon;
            lat = (e.clientY - startY) * 0.15 + startLat;
            lat = Math.max(-85, Math.min(85, lat));
        };
        document.addEventListener('pointerup', () => document.removeEventListener('pointermove', onMove));

        const keys = { w:0, a:0, s:0, d:0 };
        const setupKey = (id, k) => {
            const btn = document.getElementById(id);
            btn.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[k] = 1; });
            btn.addEventListener('pointerup', () => keys[k] = 0);
            btn.addEventListener('pointerleave', () => keys[k] = 0);
        };
        setupKey('btn-w','w'); setupKey('btn-a','a'); setupKey('btn-s','s'); setupKey('btn-d','d');

        let bob = 0;
        function animate() {
            requestAnimationFrame(animate);

            // Camera Look
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position);
            camera.lookAt(target);

            // Vector Movement
            const dir = new THREE.Vector3().setFromSphericalCoords(1, Math.PI/2, theta);
            const side = new THREE.Vector3().setFromSphericalCoords(1, Math.PI/2, theta + Math.PI/2);
            
            const speed = 1.3;
            if (keys.w) camera.position.addScaledVector(dir, speed);
            if (keys.s) camera.position.addScaledVector(dir, -speed);
            if (keys.a) camera.position.addScaledVector(side, -speed);
            if (keys.d) camera.position.addScaledVector(side, speed);

            // Walking Bob
            if (keys.w || keys.s || keys.a || keys.d) {
                bob += 0.12;
                camera.position.y = 18 + Math.sin(bob) * 0.4;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
