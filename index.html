<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Forest - Ground Up Rewrite</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #a3b1c6; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        #controls {
            position: absolute;
            bottom: 50px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }
        .btn-row { display: flex; gap: 12px; justify-content: center; }
        .key-btn {
            width: 72px;
            height: 72px;
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .key-btn:active { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div id="controls">
        <div class="btn-row"><div class="key-btn" id="up">W</div></div>
        <div class="btn-row">
            <div class="key-btn" id="left">A</div>
            <div class="key-btn" id="down">S</div>
            <div class="key-btn" id="right">D</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { BufferGeometryUtils } from 'three/addons/utils/BufferGeometryUtils.js';

        // --- RENDERER SETUP ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3b1c6);
        scene.fog = new THREE.Fog(0xa3b1c6, 20, 4500);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 8000);
        camera.position.set(0, 18, 0);

        // --- LIGHTING ---
        const ambient = new THREE.HemisphereLight(0xffffff, 0x444444, 2.2);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 150, 50);
        scene.add(sun);

        // --- GROUND ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(15000, 15000),
            new THREE.MeshPhongMaterial({ color: 0x2b1d0e })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- TREE GENERATOR (TRUNK ONLY BOTTOM) ---
        function createTreeGeom() {
            const parts = [];

            // Short Trunk: Base up to bottom of first cone
            const trunkHeight = 60;
            const trunk = new THREE.CylinderGeometry(2.8, 5, trunkHeight, 8);
            trunk.translate(0, trunkHeight / 2, 0);
            parts.push(trunk);

            // Leaf Stack
            const layers = [
                { r: 48, h: 65, y: 50 },  // Bottom cone covers top of trunk
                { r: 38, h: 55, y: 90 },
                { r: 28, h: 45, y: 125 },
                { r: 18, h: 35, y: 155 }
            ];

            layers.forEach(layer => {
                const cone = new THREE.ConeGeometry(layer.r, layer.h, 10);
                cone.translate(0, layer.y, 0);
                parts.push(cone);
            });

            return BufferGeometryUtils.mergeGeometries(parts);
        }

        // --- INSTANCING SYSTEM ---
        const treeCount = 6500;
        const geometry = createTreeGeom();
        const material = new THREE.MeshPhongMaterial({ color: 0x355E3B, flatShading: true });
        const forest = new THREE.InstancedMesh(geometry, material, treeCount);

        const matrix = new THREE.Matrix4();
        const rotation = new THREE.Quaternion();
        const position = new THREE.Vector3();
        const scale = new THREE.Vector3();

        for (let i = 0; i < treeCount; i++) {
            position.set((Math.random() - 0.5) * 13000, 0, (Math.random() - 0.5) * 13000);
            rotation.setFromEuler(new THREE.Euler(0, Math.random() * Math.PI, 0));
            const s = 0.6 + Math.random() * 1.5;
            scale.set(s, s, s);
            
            matrix.compose(position, rotation, scale);
            forest.setMatrixAt(i, matrix);
        }
        scene.add(forest);

        // --- MOVEMENT & CONTROLS ---
        let yaw = 0, pitch = 0;
        const keys = { w: false, a: false, s: false, d: false };

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); keys[k] = true; };
            el.onpointerup = el.onpointerleave = () => keys[k] = false;
        };
        bind('up', 'w'); bind('left', 'a'); bind('down', 's'); bind('right', 'd');

        document.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch' || e.buttons > 0) {
                yaw -= e.movementX * 0.003;
                pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.003));
            }
        });

        // --- ANIMATION LOOP ---
        let bob = 0;
        function render() {
            requestAnimationFrame(render);

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            const dir = new THREE.Vector3();
            if (keys.w) dir.z -= 1;
            if (keys.s) dir.z += 1;
            if (keys.a) dir.x -= 1;
            if (keys.d) dir.x += 1;

            if (dir.lengthSq() > 0) {
                dir.normalize().applyQuaternion(camera.quaternion);
                dir.y = 0;
                camera.position.addScaledVector(dir, 1.8);
                bob += 0.16;
                camera.position.y = 18 + Math.sin(bob) * 0.5;
            }

            renderer.render(scene, camera);
        }
        render();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
