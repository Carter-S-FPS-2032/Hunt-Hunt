<!DOCTYPE html>
<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World: Massive Randomized Map</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020205; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Massive Scatter System</h1>
        <p>Status: <span id="status">Generating Huge Map...</span></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.FogExp2(0x050508, 0.005); // Fog adds depth to a huge map
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(50, 30, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.maxDistance = 800;

        // Lighting
        scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, 1.2));

        // --- HUGE MAP SETTINGS ---
        const MAP_SIZE = 500; 
        const GRASS_COUNT = 5000; // Increased for a massive feel
        const ROCK_COUNT = 800;   // Spread across the map
        const loader = new FBXLoader();

        /**
         * Scatters instances with massive randomization
         */
        function scatterAsset(name, count, isGrass) {
            loader.load(`./assets/${name}.fbx`, (fbx) => {
                let sourceMesh;
                fbx.traverse(child => { if (child.isMesh) sourceMesh = child; });

                if (!sourceMesh) return;

                const material = new THREE.MeshPhongMaterial({
                    vertexColors: isGrass, // Grass "colors itself" via FBX data
                    color: isGrass ? 0xffffff : 0x333333, // Rocks are dark grey
                    shininess: isGrass ? 5 : 2
                });

                const instancedMesh = new THREE.InstancedMesh(sourceMesh.geometry, material, count);
                const matrix = new THREE.Matrix4();
                const position = new THREE.Vector3();
                const rotation = new THREE.Euler();
                const scale = new THREE.Vector3();
                const quaternion = new THREE.Quaternion();

                for (let i = 0; i < count; i++) {
                    // RANDOM POSITION across the huge map
                    position.set(
                        (Math.random() - 0.5) * MAP_SIZE,
                        0, 
                        (Math.random() - 0.5) * MAP_SIZE
                    );

                    // RANDOM ROTATION (Full 360 on Y)
                    rotation.set(0, Math.random() * Math.PI * 2, 0);
                    quaternion.setFromEuler(rotation);

                    // RANDOMIZED SCALE
                    if (isGrass) {
                        const s = 0.3 + Math.random() * 0.7; // Grass size variation
                        scale.set(s, s, s);
                    } else {
                        const s = 0.05 + Math.random() * 0.15; // ROCKS ARE TINY/RANDOM
                        scale.set(s, s, s);
                    }

                    matrix.compose(position, quaternion, scale);
                    instancedMesh.setMatrixAt(i, matrix);
                }

                scene.add(instancedMesh);
                document.getElementById('status').innerText = `Generated ${GRASS_COUNT + ROCK_COUNT} objects.`;
            });
        }

        // Load and randomize
        scatterAsset("Grass", GRASS_COUNT, true);
        scatterAsset("smallrocks", ROCK_COUNT, false);

        // --- GROUND ---
        const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x080808 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
