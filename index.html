<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Stylized Forest - Advanced Gait</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; 
        }
        
        #hud {
            position: absolute;
            bottom: 40px;
            left: 30px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .control-node {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 50%; /* Rounded for a joystick feel */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            user-select: none;
            transition: background 0.2s;
        }

        .control-node:active { background: rgba(255, 255, 255, 0.4); }

        #w { grid-area: up; }
        #a { grid-area: left; }
        #s { grid-area: down; }
        #d { grid-area: right; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="control-node" id="w">W</div>
        <div class="control-node" id="a">A</div>
        <div class="control-node" id="s">S</div>
        <div class="control-node" id="d">D</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x8798b0);
        scene.fog = new THREE.FogExp2(0x8798b0, 0.0018);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
        camera.position.set(0, 20, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(100, 300, 100);
        scene.add(sun);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(30000, 30000),
            new THREE.MeshStandardMaterial({ color: 0x151d15, roughness: 1 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- MASSIVE FOREST (10,000 Trees) ---
        const treeCount = 10000;
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3d221f, flatShading: true });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x1e331e, flatShading: true });

        // Optimized low-poly trunk (4 sides)
        const trunkGeom = new THREE.CylinderGeometry(2, 4, 60, 4);
        trunkGeom.translate(0, 30, 0);
        const trunkMesh = new THREE.InstancedMesh(trunkGeom, trunkMat, treeCount);

        // Optimized foliage
        const cone1 = new THREE.ConeGeometry(35, 60, 4); cone1.translate(0, 50, 0);
        const cone2 = new THREE.ConeGeometry(25, 50, 4); cone2.translate(0, 90, 0);
        const leafGeom = BufferGeometryUtils.mergeGeometries([cone1, cone2]);
        const leafMesh = new THREE.InstancedMesh(leafGeom, leafMat, treeCount);

        const dummy = new THREE.Object3D();
        for (let i = 0; i < treeCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 200 + Math.random() * 12000;
            dummy.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            dummy.rotation.y = Math.random() * Math.PI;
            const s = 0.5 + Math.random() * 1.5;
            dummy.scale.set(s, s, s);
            dummy.updateMatrix();
            trunkMesh.setMatrixAt(i, dummy.matrix);
            leafMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(trunkMesh, leafMesh);

        // --- CONTROLS ---
        let yaw = 0, pitch = 0;
        const keys = { w: false, a: false, s: false, d: false };
        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[k] = true; });
            el.addEventListener('pointerup', () => keys[k] = false);
            el.addEventListener('pointerleave', () => keys[k] = false);
        };
        ['w', 'a', 's', 'd'].forEach(k => bind(k, k));
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        let lastX = 0, lastY = 0;
        document.addEventListener('pointermove', (e) => {
            if (e.buttons > 0 || e.pointerType === 'touch') {
                yaw -= (e.movementX || (e.clientX - lastX)) * 0.003;
                pitch = Math.max(-1.4, Math.min(1.4, pitch - (e.movementY || (e.clientY - lastY)) * 0.003));
            }
            lastX = e.clientX; lastY = e.clientY;
        });

        // --- ANIMATION ENGINE ---
        let stride = 0;
        let speed = 0;
        const baseHeight = 20;

        function animate() {
            requestAnimationFrame(animate);
            
            // Input vector
            const move = new THREE.Vector3();
            if (keys.w) move.z -= 1;
            if (keys.s) move.z += 1;
            if (keys.a) move.x -= 1;
            if (keys.d) move.x += 1;

            if (move.lengthSq() > 0) {
                speed = THREE.MathUtils.lerp(speed, 4.5, 0.05); // Smooth acceleration
                move.normalize().applyQuaternion(camera.quaternion);
                move.y = 0;
                camera.position.addScaledVector(move, speed);
                
                // Advanced Gait Calculation
                stride += 0.18; 
                
                // Vertical Bob (Head dip)
                const bob = Math.sin(stride) * 1.5;
                camera.position.y = baseHeight + bob;
                
                // Shoulder Roll (Side tilt)
                const roll = Math.cos(stride * 0.5) * 0.04;
                camera.rotation.set(pitch, yaw, roll, 'YXZ');
                
                // Dynamic FOV (Speed sensation)
                camera.fov = THREE.MathUtils.lerp(camera.fov, 85, 0.05);
            } else {
                speed = THREE.MathUtils.lerp(speed, 0, 0.1);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, baseHeight, 0.05);
                camera.rotation.set(pitch, yaw, THREE.MathUtils.lerp(camera.rotation.z, 0, 0.1), 'YXZ');
                camera.fov = THREE.MathUtils.lerp(camera.fov, 75, 0.05);
            }
            camera.updateProjectionMatrix();

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
