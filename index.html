<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World: Optimized Massive Explorer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="margin:0;">Massive World Engine</h1>
        <p>CLICK TO ENTER | WASD TO WALK</p>
        <p id="status">Status: Loading Assets...</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- WORLD CONSTANTS ---
        const MAP_SIZE = 1500; 
        const RENDER_DIST = 1000;
        const GRASS_COUNT = 12000;
        const ROCK_COUNT = 2000;
        const TREE_COUNT = 500;

        // --- SCENE & RENDERER ---
        const scene = new THREE.Scene();
        const skyColor = 0x87ceeb;
        scene.background = new THREE.Color(skyColor);
        scene.fog = new THREE.Fog(skyColor, 100, RENDER_DIST);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        let keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // --- TERRAIN GENERATOR ---
        const getHeight = (x, z) => {
            // Complex noise simulation for occasional hills
            return Math.sin(x * 0.015) * Math.cos(z * 0.015) * 20 + 
                   Math.sin(x * 0.005) * 10;
        };

        const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 128, 128);
        const posAttr = groundGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            let x = posAttr.getX(i);
            let y = posAttr.getY(i);
            posAttr.setZ(i, getHeight(x, y));
        }
        groundGeo.computeVertexNormals();
        const ground = new THREE.Mesh(groundGeo, new THREE.MeshPhongMaterial({ color: 0x223322 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- ASSET SCATTERING ---
        const loader = new FBXLoader();
        function scatter(name, count, isGrass, isTree = false) {
            loader.load(`./assets/${name}.fbx`, (fbx) => {
                let mesh;
                fbx.traverse(c => { if(c.isMesh) mesh = c; });
                if(!mesh) return;

                const mat = new THREE.MeshPhongMaterial({
                    vertexColors: isGrass, // Fixed: Uses internal FBX colors
                    color: isGrass ? 0xffffff : (isTree ? 0x1a331a : 0x555555),
                    shininess: 0
                });

                const inst = new THREE.InstancedMesh(mesh.geometry, mat, count);
                const dummy = new THREE.Object3D();

                for (let i = 0; i < count; i++) {
                    const x = (Math.random() - 0.5) * MAP_SIZE;
                    const z = (Math.random() - 0.5) * MAP_SIZE;
                    dummy.position.set(x, getHeight(x, z), z);
                    
                    dummy.rotation.y = Math.random() * Math.PI * 2;
                    
                    let s = isGrass ? 0.4 : (isTree ? 5.0 : 0.08); // Rocks are tiny
                    s *= (0.7 + Math.random() * 0.6);
                    dummy.scale.set(s, s, s);
                    
                    dummy.updateMatrix();
                    inst.setMatrixAt(i, dummy.matrix);
                }
                scene.add(inst);
            });
        }

        // Trigger loaders
        scatter("Grass", GRASS_COUNT, true);
        scatter("smallrocks", ROCK_COUNT, false);
        scatter("Tree", TREE_COUNT, false, true);

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(100, 100, 50);
        scene.add(sun);

        // --- ANIMATION LOOP ---
        const velocity = new THREE.Vector3();
        const clock = new THREE.Clock();
        let bobTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (controls.isLocked) {
                // Movement Physics
                const speed = 120.0;
                velocity.x -= velocity.x * 10.0 * dt;
                velocity.z -= velocity.z * 10.0 * dt;

                const dir = new THREE.Vector3(
                    Number(keys.d) - Number(keys.a),
                    0,
                    Number(keys.s) - Number(keys.w)
                ).normalize();

                if (dir.length() > 0) {
                    velocity.x += dir.x * speed * dt;
                    velocity.z += dir.z * speed * dt;
                    bobTime += dt * 12; // Bob frequency
                }

                controls.moveRight(velocity.x);
                controls.moveForward(-velocity.z);

                // Terrain Follow + Head Bob
                const terrainY = getHeight(camera.position.x, camera.position.z);
                const bobScale = dir.length() > 0 ? Math.sin(bobTime) * 0.4 : 0;
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, terrainY + 6 + bobScale, 0.1);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        document.getElementById('status').innerText = "World Generated. Click to Start.";
    </script>
</body>
</html>
