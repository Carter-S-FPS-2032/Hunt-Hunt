<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forest Hunter - Fixed Gear</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; overflow: hidden; background: #05070a; font-family: sans-serif; touch-action: none; }
        #hud { position: absolute; bottom: 40px; left: 30px; display: grid; grid-template-areas: ". up ." "left down right"; gap: 15px; z-index: 10; pointer-events: none; }
        .control-node { pointer-events: auto; width: 65px; height: 65px; background: var(--glass); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-weight: 800; user-select: none; -webkit-user-select: none; }
        .control-node:active { background: rgba(255, 255, 255, 0.2); color: #fff; }
        #w { grid-area: up; } #a { grid-area: left; } #s { grid-area: down; } #d { grid-area: right; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 16px; background: rgba(255,255,255,0.4); pointer-events: none; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 2px; background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="hud">
        <div class="control-node" id="w">W</div>
        <div class="control-node" id="a">A</div>
        <div class="control-node" id="s">S</div>
        <div class="control-node" id="d">D</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080a0c);
        scene.fog = new THREE.FogExp2(0x080a0c, 0.0035);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 15000);
        camera.position.set(0, 22, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0x445566, 2.5);
        sun.position.set(50, 100, 50);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.25));

        // --- IMPROVED GROUND ---
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#121510';
        ctx.fillRect(0, 0, 256, 256);
        for(let i=0; i<4000; i++) {
            ctx.fillStyle = `rgba(30, 45, 15, ${Math.random()})`;
            ctx.fillRect(Math.random()*256, Math.random()*256, 1.5, 1.5);
        }
        const groundTex = new THREE.CanvasTexture(canvas);
        groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
        groundTex.repeat.set(1000, 1000);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(30000, 30000),
            new THREE.MeshStandardMaterial({ map: groundTex, roughness: 1 })
        );
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // --- LAYERED BOREAL TREES ---
        const treeCount = 20000;
        const radius = 9000;
        const treePositions = [];
        const grid = new Map();
        const gridSize = 120;

        const trunkMesh = new THREE.InstancedMesh(new THREE.CylinderGeometry(2, 3.5, 100, 5), new THREE.MeshStandardMaterial({ color: 0x1a1410 }), treeCount);
        // Multi-layered Boreal foliage
        const leafMesh1 = new THREE.InstancedMesh(new THREE.ConeGeometry(40, 120, 4), new THREE.MeshStandardMaterial({ color: 0x0a160a, flatShading: true }), treeCount);
        const leafMesh2 = new THREE.InstancedMesh(new THREE.ConeGeometry(25, 80, 4), new THREE.MeshStandardMaterial({ color: 0x081208, flatShading: true }), treeCount);

        const dummy = new THREE.Object3D();
        const leafDummy1 = new THREE.Object3D();
        const leafDummy2 = new THREE.Object3D();

        for (let i = 0; i < treeCount; i++) {
            const r = Math.sqrt(Math.random()) * radius;
            const theta = Math.random() * Math.PI * 2;
            const x = r * Math.cos(theta); const z = r * Math.sin(theta);
            const s = 0.7 + Math.random() * 1.3;
            
            dummy.position.set(x, 0, z); dummy.scale.set(s, s, s); dummy.rotation.y = Math.random(); dummy.updateMatrix();
            trunkMesh.setMatrixAt(i, dummy.matrix);

            leafDummy1.position.set(x, 40 * s, z); leafDummy1.scale.set(s, s, s); leafDummy1.rotation.y = dummy.rotation.y; leafDummy1.updateMatrix();
            leafMesh1.setMatrixAt(i, leafDummy1.matrix);

            leafDummy2.position.set(x, 80 * s, z); leafDummy2.scale.set(s, s, s); leafDummy2.rotation.y = dummy.rotation.y + 0.5; leafDummy2.updateMatrix();
            leafMesh2.setMatrixAt(i, leafDummy2.matrix);
            
            treePositions.push({ x, z, r: 4.5 * s });
            const gx = Math.floor(x/gridSize), gz = Math.floor(z/gridSize), key = `${gx},${gz}`;
            if(!grid.has(key)) grid.set(key, []); grid.get(key).push(i);
        }
        scene.add(trunkMesh, leafMesh1, leafMesh2);

        // --- THE FIXED RIFLE ---
        const rifle = new THREE.Group();
        const steelMat = new THREE.MeshStandardMaterial({ color: 0x121214, metalness: 0.9, roughness: 0.1 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x2d1b0e, roughness: 0.8 });

        // Stock and Forend
        const stock = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 10), woodMat);
        stock.position.set(0, -0.6, 0); rifle.add(stock);
        
        const forend = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 7), woodMat);
        forend.position.set(0, -0.2, -7.5); rifle.add(forend);

        // Barrel
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.45, 26, 12), steelMat);
        barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.45, -12); rifle.add(barrel);

        // Scope Body
        const scopeGroup = new THREE.Group();
        const mainTube = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 8, 16), steelMat);
        mainTube.rotation.x = Math.PI/2;
        
        const bellFront = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.38, 1.8, 16), steelMat);
        bellFront.rotation.x = Math.PI/2; bellFront.position.z = -4.5;
        
        const bellBack = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.38, 1.2, 16), steelMat);
        bellBack.rotation.x = Math.PI/2; bellBack.position.z = 4.2;

        // PHYSICAL MOUNTS (The "Clamps")
        const mount1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.5), steelMat);
        mount1.position.set(0, -0.6, -2);
        const mount2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.5), steelMat);
        mount2.position.set(0, -0.6, 2);

        // Lens (Nested INSIDE the bellBack)
        const lensGeom = new THREE.CircleGeometry(0.42, 16);
        const lensMat = new THREE.MeshStandardMaterial({ color: 0x051122, emissive: 0x003366, roughness: 0, metalness: 1, transparent: true, opacity: 0.9 });
        const scopeLens = new THREE.Mesh(lensGeom, lensMat);
        scopeLens.position.z = 4.81; // Flush with rear bell

        scopeGroup.add(mainTube, bellFront, bellBack, mount1, mount2, scopeLens);
        scopeGroup.position.set(0, 1.5, -4);
        rifle.add(scopeGroup);

        rifle.position.set(1.8, -1.9, -2.5);
        camera.add(rifle); scene.add(camera);

        // --- SYSTEM ---
        let yaw = 0, pitch = 0, stride = 0, speed = 0;
        const keys = { w: false, a: false, s: false, d: false };
        window.onkeydown = (e) => { const k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k]=true; };
        window.onkeyup = (e) => { const k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k]=false; };

        let lx = 0, ly = 0;
        document.onpointermove = (e) => {
            if(e.buttons > 0 || e.pointerType === 'touch') {
                yaw -= (e.movementX || e.clientX - lx) * 0.0022;
                pitch = Math.max(-1.4, Math.min(1.4, pitch - (e.movementY || e.clientY - ly) * 0.0022));
            }
            lx = e.clientX; ly = e.clientY;
        };

        function checkHit(p) {
            const gx = Math.floor(p.x/gridSize), gz = Math.floor(p.z/gridSize);
            for(let x=gx-1; x<=gx+1; x++) {
                for(let z=gz-1; z<=gz+1; z++) {
                    const cell = grid.get(`${x},${z}`);
                    if(cell) for(const i of cell) {
                        const t = treePositions[i], dx = p.x-t.x, dz = p.z-t.z;
                        if(dx*dx + dz*dz < (t.r+3.5)**2) return true;
                    }
                }
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            const move = new THREE.Vector3();
            if(keys.w) move.z -= 1; if(keys.s) move.z += 1;
            if(keys.a) move.x -= 1; if(keys.d) move.x += 1;

            if(move.lengthSq() > 0) {
                speed = THREE.MathUtils.lerp(speed, 1.55, 0.05);
                move.normalize().applyQuaternion(camera.quaternion);
                move.y = 0;
                const next = camera.position.clone().addScaledVector(move, speed);
                if(!checkHit({x: next.x, z: camera.position.z})) camera.position.x = next.x;
                if(!checkHit({x: camera.position.x, z: next.z})) camera.position.z = next.z;
                stride += 0.085;
                camera.position.y = 22 + Math.sin(stride) * 0.28;
                rifle.position.y = -1.9 + Math.sin(stride*2) * 0.045;
                rifle.position.x = 1.8 + Math.cos(stride) * 0.03;
            } else {
                speed = 0; camera.position.y = THREE.MathUtils.lerp(camera.position.y, 22, 0.1);
            }
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
        ['w', 'a', 's', 'd'].forEach(k => {
            const el = document.getElementById(k);
            el.onpointerdown = (e) => { e.preventDefault(); keys[k] = true; };
            el.onpointerup = () => keys[k] = false;
        });
    </script>
</body>
</html>
