<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World: Grass & Rocks</title>
    <style>
        /* Removes scrollbars and sets a dark background */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: sans-serif;
        }
        canvas { 
            display: block; 
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Asset Loader</h1>
        <p>Status: <span id="status">Initializing...</span></p>
    </div>

    <!-- Load Three.js and FBXLoader from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // --- CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- ASSET LOADING LOGIC ---
        const loader = new FBXLoader();
        const statusEl = document.getElementById('status');

        /**
         * Loads and configures models. 
         * Note: 'Grass' is capitalized to meet specific naming requirements.
         */
        const loadAsset = (name, positionX) => {
            const fileName = `./assets/${name}.fbx`;
            
            loader.load(fileName, (object) => {
                object.position.x = positionX;
                
                object.traverse((child) => {
                    if (child.isMesh) {
                        // THE "COLOR ITSELF" LOGIC
                        if (name === "Grass") {
                            // Grass uses internal vertex colors from FBX binary[cite: 5]
                            child.material = new THREE.MeshPhongMaterial({
                                vertexColors: true,
                                shininess: 10
                            });
                        } else {
                            // smallrocks uses standard lowercase naming and grey material[cite: 4]
                            child.material = new THREE.MeshPhongMaterial({ 
                                color: 0x666666 
                            });
                        }
                    }
                });

                scene.add(object);
                statusEl.innerText = "Assets Loaded: Grass & smallrocks";
            }, 
            (xhr) => {
                statusEl.innerText = `Loading ${name}: ${Math.round((xhr.loaded / xhr.total) * 100)}%`;
            },
            (error) => {
                console.error(`Error loading ${name}:`, error);
                statusEl.innerText = `Error: Missing ${name}.fbx`;
            });
        };

        // Initialize assets per specifications
        loadAsset("Grass", -1);      // Uppercase G
        loadAsset("smallrocks", 1);  // Lowercase s

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // --- WINDOW RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
