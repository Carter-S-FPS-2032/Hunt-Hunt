<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dense Forest - iPad Pro Compatible</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #0a0d10; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; /* Crucial for iPad touch/trackpad stability */
        }
        
        #hud {
            position: absolute;
            bottom: 40px;
            left: 30px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 15px;
            z-index: 10;
            pointer-events: none;
        }

        .control-node {
            pointer-events: auto;
            width: 65px;
            height: 65px;
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-weight: 800;
            user-select: none;
            -webkit-user-select: none;
        }

        .control-node:active { background: rgba(255, 255, 255, 0.2); color: #fff; }

        #w { grid-area: up; }
        #a { grid-area: left; }
        #s { grid-area: down; }
        #d { grid-area: right; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="control-node" id="w">W</div>
        <div class="control-node" id="a">A</div>
        <div class="control-node" id="s">S</div>
        <div class="control-node" id="d">D</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x14181c);
        scene.fog = new THREE.FogExp2(0x14181c, 0.0025);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 15000);
        camera.position.set(0, 22, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0x7788ff, 1.2);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(30000, 30000),
            new THREE.MeshStandardMaterial({ color: 0x080a08, roughness: 1 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- TREE INSTANCING (30,000) ---
        const treeCount = 30000;
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x221814, flatShading: true });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x0f1a0f, flatShading: true });

        const trunkGeom = new THREE.CylinderGeometry(2.5, 4, 80, 4);
        trunkGeom.translate(0, 40, 0);
        const trunkMesh = new THREE.InstancedMesh(trunkGeom, trunkMat, treeCount);

        const c1 = new THREE.ConeGeometry(40, 70, 4); c1.translate(0, 65, 0);
        const c2 = new THREE.ConeGeometry(25, 55, 4); c2.translate(0, 105, 0);
        const leafGeom = BufferGeometryUtils.mergeGeometries([c1, c2]);
        const leafMesh = new THREE.InstancedMesh(leafGeom, leafMat, treeCount);

        const dummy = new THREE.Object3D();
        const radius = 12000;
        for (let i = 0; i < treeCount; i++) {
            const r = Math.sqrt(Math.random()) * radius;
            const theta = Math.random() * Math.PI * 2;
            dummy.position.set(r * Math.cos(theta), 0, r * Math.sin(theta));
            dummy.rotation.y = Math.random() * Math.PI;
            const s = 0.5 + Math.random() * 1.8;
            dummy.scale.set(s, s, s);
            dummy.updateMatrix();
            trunkMesh.setMatrixAt(i, dummy.matrix);
            leafMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(trunkMesh, leafMesh);

        // --- CONTROL STATE ---
        let yaw = 0, pitch = 0;
        const keys = { w: false, a: false, s: false, d: false };

        // --- IPAD KEYBOARD SUPPORT ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // --- HUD TOUCH CONTROLS ---
        const bindHUD = (id, k) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[k] = true; });
            el.addEventListener('pointerup', () => keys[k] = false);
            el.addEventListener('pointerleave', () => keys[k] = false);
        };
        ['w', 'a', 's', 'd'].forEach(k => bindHUD(k, k));

        // --- TRACKPAD & MOUSE & TOUCH LOOK ---
        let lastX = 0, lastY = 0;
        let isPointerDown = false;

        document.addEventListener('pointerdown', (e) => {
            isPointerDown = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('pointermove', (e) => {
            // Check buttons for mouse/trackpad, or simply check if finger is down
            if (isPointerDown || e.pointerType === 'mouse' && e.buttons > 0) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;

                yaw -= dx * 0.0025;
                pitch -= dy * 0.0025;
                pitch = Math.max(-1.3, Math.min(1.3, pitch));

                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        document.addEventListener('pointerup', () => isPointerDown = false);
        document.addEventListener('pointercancel', () => isPointerDown = false);

        // --- ANIMATION LOOP ---
        let stride = 0;
        let speed = 0;
        const baseHeight = 22;

        function animate() {
            requestAnimationFrame(animate);
            
            const move = new THREE.Vector3();
            if (keys.w) move.z -= 1;
            if (keys.s) move.z += 1;
            if (keys.a) move.x -= 1;
            if (keys.d) move.x += 1;

            if (move.lengthSq() > 0) {
                speed = THREE.MathUtils.lerp(speed, 1.2, 0.02); 
                move.normalize().applyQuaternion(camera.quaternion);
                move.y = 0;
                camera.position.addScaledVector(move, speed);
                
                stride += 0.06; 
                const bob = Math.sin(stride) * 0.2; // Subtle Up/Down
                const roll = Math.cos(stride * 0.5) * 0.01;
                
                camera.position.y = baseHeight + bob;
                camera.rotation.set(pitch, yaw, roll, 'YXZ');
            } else {
                speed = THREE.MathUtils.lerp(speed, 0, 0.05);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, baseHeight, 0.05);
                camera.rotation.set(pitch, yaw, THREE.MathUtils.lerp(camera.rotation.z, 0, 0.05), 'YXZ');
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
