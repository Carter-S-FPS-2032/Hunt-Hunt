<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Stylized Forest</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #87ceeb; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; /* Prevents pull-to-refresh and scrolling */
        }
        
        #hud {
            position: absolute;
            bottom: 40px;
            left: 30px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .control-node {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .control-node:active {
            background: rgba(255, 255, 255, 0.3);
        }

        #w { grid-area: up; }
        #a { grid-area: left; }
        #s { grid-area: down; }
        #d { grid-area: right; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="control-node" id="w">W</div>
        <div class="control-node" id="a">A</div>
        <div class="control-node" id="s">S</div>
        <div class="control-node" id="d">D</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

        // --- SCENE & RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3b1c6);
        scene.fog = new THREE.FogExp2(0xa3b1c6, 0.0012);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 18, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // --- WORLD OBJECTS ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(15000, 15000),
            new THREE.MeshStandardMaterial({ color: 0x241d14, roughness: 0.9 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        function createStylizedTree() {
            const geoms = [];
            
            const trunk = new THREE.CylinderGeometry(3, 5, 60, 6);
            trunk.translate(0, 30, 0);
            geoms.push(trunk);

            const layers = [
                { r: 45, h: 60, y: 55 },
                { r: 35, h: 50, y: 95 },
                { r: 25, h: 40, y: 130 },
                { r: 15, h: 30, y: 155 }
            ];

            layers.forEach(l => {
                const cone = new THREE.ConeGeometry(l.r, l.h, 6);
                cone.translate(0, l.y, 0);
                geoms.push(cone);
            });

            return BufferGeometryUtils.mergeGeometries(geoms);
        }

        const count = 4000; // Slightly reduced for better performance on mobile
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x2d4c2d, flatShading: true });
        const trees = new THREE.InstancedMesh(createStylizedTree(), treeMat, count);
        
        const dummy = new THREE.Object3D();
        for (let i = 0; i < count; i++) {
            dummy.position.set((Math.random() - 0.5) * 10000, 0, (Math.random() - 0.5) * 10000);
            dummy.rotation.y = Math.random() * Math.PI;
            const s = 0.5 + Math.random() * 1.2;
            dummy.scale.set(s, s, s);
            dummy.updateMatrix();
            trees.setMatrixAt(i, dummy.matrix);
        }
        scene.add(trees);

        // --- CONTROLS ---
        let yaw = 0, pitch = 0;
        const keys = { w: false, a: false, s: false, d: false };

        // HUD Controls
        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[k] = true; });
            el.addEventListener('pointerup', () => keys[k] = false);
            el.addEventListener('pointerleave', () => keys[k] = false);
        };
        ['w', 'a', 's', 'd'].forEach(k => bind(k, k));

        // Keyboard Controls
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // Camera Look (Mouse & Touch)
        let lastX = 0, lastY = 0;
        document.addEventListener('pointerdown', (e) => {
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('pointermove', (e) => {
            if (e.buttons > 0 || e.pointerType === 'touch') {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                
                yaw -= (e.movementX || dx) * 0.003;
                pitch -= (e.movementY || dy) * 0.003;
                pitch = Math.max(-1.4, Math.min(1.4, pitch));
                
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        // --- LOOP ---
        let bob = 0;
        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            const move = new THREE.Vector3();
            if (keys.w) move.z -= 1;
            if (keys.s) move.z += 1;
            if (keys.a) move.x -= 1;
            if (keys.d) move.x += 1;

            if (move.lengthSq() > 0) {
                move.normalize().applyQuaternion(camera.quaternion);
                move.y = 0; // Keep movement on the ground
                camera.position.addScaledVector(move, 2.5);
                bob += 0.15;
                camera.position.y = 18 + Math.sin(bob) * 0.5;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
