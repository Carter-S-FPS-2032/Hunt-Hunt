<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forest Hunter: Wildlife Overhaul</title>
    <style>
        :root { --gold: #ffaa00; --ui-bg: rgba(5, 10, 15, 0.95); }
        body { margin: 0; overflow: hidden; background: #010204; font-family: 'Courier New', monospace; color: #fff; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; pointer-events: none; z-index: 100; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: #ff0000; transform: translate(-50%, -50%); }

        #stats { position: absolute; top: 20px; left: 20px; background: var(--ui-bg); padding: 15px; border-radius: 5px; border-left: 4px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #minimap { position: absolute; top: 20px; right: 20px; width: 150px; height: 150px; background: var(--ui-bg); border: 2px solid #333; border-radius: 50%; overflow: hidden; }
        #map-p { position: absolute; width: 6px; height: 6px; background: #0f0; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #map-s { position: absolute; width: 10px; height: 10px; background: var(--gold); border-radius: 2px; }

        #backpack-ui { position: absolute; bottom: 120px; right: 20px; background: var(--ui-bg); border: 1px solid #444; padding: 15px; width: 200px; display: none; }
        #hud-mobile { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-areas: ". u ." "l d r"; gap: 10px; }
        .btn { width: 55px; height: 55px; background: rgba(255,255,255,0.05); border: 1px solid #444; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="stats">
        <div style="color:var(--gold); font-weight:bold;">$ <span id="money">0</span></div>
        <div style="font-size:12px;">CARGO: <span id="weight">0</span>/50kg</div>
    </div>
    
    <div id="minimap"><div id="map-s"></div><div id="map-p"></div></div>

    <div id="backpack-ui"><strong>INVENTORY</strong><hr><div id="inv-list" style="font-size:11px;">Empty</div></div>

    <div id="hud-mobile">
        <div class="btn" style="grid-area: u" id="w">W</div>
        <div class="btn" style="grid-area: l" id="a">A</div>
        <div class="btn" style="grid-area: d" id="s">S</div>
        <div class="btn" style="grid-area: r" id="d">D</div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010204);
        scene.fog = new THREE.FogExp2(0x010204, 0.0018);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 15000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ENHANCED LIGHTING ---
        const ambient = new THREE.HemisphereLight(0x0a1020, 0x050505, 0.5);
        scene.add(ambient);
        const moon = new THREE.DirectionalLight(0x556677, 1.2);
        moon.position.set(50, 100, 50);
        scene.add(moon);

        // --- WORLD ASSETS ---
        const SHOP_POS = { x: 400, z: 400 };
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({color: 0x080907}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        function createWagonShop() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(35, 25, 50), new THREE.MeshStandardMaterial({color: 0x2a1a10}));
            body.position.y = 17;
            const roof = new THREE.Mesh(new THREE.CylinderGeometry(25, 25, 55, 3, 1, false, 0, Math.PI), new THREE.MeshStandardMaterial({color: 0x1a110a}));
            roof.rotation.set(0, Math.PI/2, Math.PI/2); roof.position.y = 35;
            const lamp = new THREE.PointLight(0xff6600, 1500, 80); lamp.position.set(22, 20, 0);
            group.add(body, roof, lamp);
            return group;
        }
        const store = createWagonShop(); store.position.set(SHOP_POS.x, 0, SHOP_POS.z); scene.add(store);

        // --- PROCEDURAL ANIMALS ---
        const animals = [];
        const species = {
            moose: { color: 0x3d2b1f, h: 12, w: 15, weight: 20 },
            wolf: { color: 0x444444, h: 5, w: 8, weight: 10 },
            fox: { color: 0xd35400, h: 3, w: 5, weight: 4 },
            deer: { color: 0x966f47, h: 8, w: 10, weight: 12 }
        };

        function buildAnimal(type, x, z, leader = null) {
            const cfg = species[type];
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(cfg.h*0.8, cfg.h*0.8, cfg.h*1.8), new THREE.MeshStandardMaterial({color: cfg.color}));
            body.position.y = cfg.h;
            
            const neck = new THREE.Mesh(new THREE.BoxGeometry(cfg.h*0.4, cfg.h, cfg.h*0.4), new THREE.MeshStandardMaterial({color: cfg.color}));
            neck.position.set(0, cfg.h*1.5, cfg.h*0.8);
            neck.rotation.x = -0.5;

            group.add(body, neck);
            group.position.set(x, 0, z);
            scene.add(group);
            animals.push({ mesh: group, type, weight: cfg.weight, leader, vel: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5) });
        }

        // Spawn Packs & Wildlife
        for(let i=0; i<6; i++) { // Wolf Packs
            let lx = (Math.random()-0.5)*3000, lz = (Math.random()-0.5)*3000;
            buildAnimal('wolf', lx, lz);
            let alpha = animals[animals.length-1];
            for(let j=0; j<3; j++) buildAnimal('wolf', lx+15, lz+15, alpha);
        }
        ['moose','deer','fox'].forEach(s => { for(let i=0; i<15; i++) buildAnimal(s, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000); });

        // --- PLAYER / WEAPON ---
        const rifle = new THREE.Group();
        const b = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 25), new THREE.MeshStandardMaterial({color:0x111, metalness:0.9}));
        b.rotation.x = Math.PI/2; b.position.z = -12;
        rifle.add(b); rifle.position.set(0, -1.4, -2.5);
        camera.add(rifle); scene.add(camera); camera.position.set(0, 25, 0);

        // --- LOGIC ---
        let yaw = 0, pitch = 0, money = 0, weight = 0;
        const keys = {};
        window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key==='b') document.getElementById('backpack-ui').style.display = 'block'; };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        document.addEventListener('pointermove', (e) => {
            if(document.pointerLockElement) {
                yaw -= e.movementX * 0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.002));
            }
        });

        renderer.domElement.onclick = () => {
            renderer.domElement.requestPointerLock();
            const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(animals.map(a => a.mesh), true);
            if(hits.length > 0) {
                const hitObj = hits[0].object.parent;
                const idx = animals.findIndex(a => a.mesh === hitObj);
                if(idx > -1 && weight + animals[idx].weight <= 50) {
                    weight += animals[idx].weight;
                    scene.remove(hitObj); animals.splice(idx, 1);
                    document.getElementById('weight').innerText = weight;
                }
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            const move = new THREE.Vector3();
            if(keys.w) move.z -= 1.8; if(keys.s) move.z += 1.8;
            if(keys.a) move.x -= 1.8; if(keys.d) move.x += 1.8;
            move.applyQuaternion(camera.quaternion); move.y = 0;
            camera.position.add(move); camera.rotation.set(pitch, yaw, 0, 'YXZ');

            // AI Pack & Movement Logic
            animals.forEach(a => {
                if(a.leader) {
                    const d = a.leader.mesh.position.clone().sub(a.mesh.position);
                    if(d.length() > 20) a.mesh.position.add(d.normalize().multiplyScalar(0.6));
                } else {
                    a.mesh.position.add(a.vel.clone().multiplyScalar(0.4));
                    if(Math.random() > 0.99) a.vel.set(Math.random()-0.5, 0, Math.random()-0.5);
                    a.mesh.lookAt(a.mesh.position.clone().add(a.vel));
                }
            });

            // Minimap & Sell
            const ds = camera.position.distanceTo(new THREE.Vector3(SHOP_POS.x, 0, SHOP_POS.z));
            document.getElementById('map-s').style.left = (75 + (SHOP_POS.x-camera.position.x)/25)+'px';
            document.getElementById('map-s').style.top = (75 + (SHOP_POS.z-camera.position.z)/25)+'px';
            
            if(ds < 60 && weight > 0) {
                money += weight * 15; weight = 0;
                document.getElementById('money').innerText = money;
                document.getElementById('weight').innerText = "0";
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
