<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World: Pro Scatter & Walk</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Vast Exploration</h1>
        <p>WASD to Walk | Status: <span id="status">Generating World...</span></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONFIG ---
        const MAP_SIZE = 1000; 
        const RENDER_DIST = 800;
        const GRASS_COUNT = 8000;
        const ROCK_COUNT = 1500;
        const TREE_COUNT = 300;

        // --- SCENE & SKY ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Light sky blue
        scene.fog = new THREE.Fog(0x87ceeb, 100, RENDER_DIST);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Sky Sphere
        const skyGeo = new THREE.SphereGeometry(RENDER_DIST, 32, 32);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, side: THREE.BackSide });
        scene.add(new THREE.Mesh(skyGeo, skyMat));

        // --- CONTROLS & WALKING ---
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let bobTimer = 0;

        const onKeyDown = (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        };
        const onKeyUp = (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- LIGHTING ---
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

        // --- HILLY FLOOR ---
        const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 100, 100);
        const posAttr = groundGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const y = posAttr.getY(i);
            posAttr.setZ(i, Math.sin(x * 0.02) * Math.cos(y * 0.02) * 15);
        }
        groundGeo.computeVertexNormals();
        const ground = new THREE.Mesh(groundGeo, new THREE.MeshPhongMaterial({ color: 0x1a2b1a }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const getHeight = (x, z) => Math.sin(x * 0.02) * Math.cos(z * 0.02) * 15;

        // --- ASSET LOADER ---
        const loader = new FBXLoader();
        function scatter(name, count, isGrass, isTree = false) {
            loader.load(`./assets/${name}.fbx`, (fbx) => {
                let mesh;
                fbx.traverse(c => { if(c.isMesh) mesh = c; });
                if(!mesh) return;

                const mat = new THREE.MeshPhongMaterial({
                    vertexColors: isGrass,
                    color: isGrass ? 0xffffff : (isTree ? 0x2d4c1e : 0x444444)
                });

                const inst = new THREE.InstancedMesh(mesh.geometry, mat, count);
                const dummy = new THREE.Object3D();

                for (let i = 0; i < count; i++) {
                    dummy.position.set((Math.random()-0.5)*MAP_SIZE, 0, (Math.random()-0.5)*MAP_SIZE);
                    dummy.position.y = getHeight(dummy.position.x, dummy.position.z);
                    dummy.rotation.y = Math.random() * Math.PI * 2;
                    let s = isGrass ? 0.5 : (isTree ? 4 : 0.1);
                    s *= (0.8 + Math.random() * 0.4);
                    dummy.scale.set(s, s, s);
                    dummy.updateMatrix();
                    inst.setMatrixAt(i, dummy.matrix);
                }
                scene.add(inst);
            });
        }

        scatter("Grass", GRASS_COUNT, true);
        scatter("smallrocks", ROCK_COUNT, false);
        scatter("Tree", TREE_COUNT, false, true);

        // --- LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Movement
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Terrain Following & Bobbing
                const playerX = camera.position.x;
                const playerZ = camera.position.z;
                const groundY = getHeight(playerX, playerZ);
                
                // Bobbing Logic
                let bobOffset = 0;
                if (moveForward || moveBackward || moveLeft || moveRight) {
                    bobTimer += delta * 10;
                    bobOffset = Math.sin(bobTimer) * 0.3; // Height of bob
                }
                camera.position.y = groundY + 5 + bobOffset;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        document.getElementById('status').innerText = "Ready. Click to Start.";
    </script>
</body>
</html>
