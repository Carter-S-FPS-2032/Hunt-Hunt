<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World: Massive Forest & Hills</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Massive Environment</h1>
        <p>Status: <span id="status">Generating Terrain...</span></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CONFIG ---
        const MAP_SIZE = 1000; 
        const RENDER_DIST = 600;
        const GRASS_COUNT = 8000;
        const ROCK_COUNT = 1500;
        const TREE_COUNT = 400;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);
        
        // Render Distance / Fog Logic
        scene.fog = new THREE.Fog(0x0a0a12, 100, RENDER_DIST);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(100, 50, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.maxDistance = RENDER_DIST - 50;

        scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, 1.2));

        // --- HILLY FLOOR ---
        const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 64, 64);
        const vertices = groundGeo.attributes.position.array;
        
        // Simple procedural hills
        for (let i = 0; i < vertices.length; i += 3) {
            const x = vertices[i];
            const y = vertices[i + 1];
            vertices[i + 2] = Math.sin(x * 0.02) * Math.cos(y * 0.02) * 15; // Elevation
        }
        groundGeo.computeVertexNormals();
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Helper to get hill height at any X, Z coordinate
        function getHeight(x, z) {
            return Math.sin(x * 0.02) * Math.cos(z * 0.02) * 15;
        }

        // --- SCATTER SYSTEM ---
        const loader = new FBXLoader();

        function scatter(name, count, isGrass, isTree = false) {
            loader.load(`./assets/${name}.fbx`, (fbx) => {
                let sourceMesh;
                fbx.traverse(child => { if (child.isMesh) sourceMesh = child; });
                if (!sourceMesh) return;

                const material = new THREE.MeshPhongMaterial({
                    vertexColors: isGrass, // Grass colors itself
                    color: isGrass ? 0xffffff : (isTree ? 0x2d4c1e : 0x333333)
                });

                const instancedMesh = new THREE.InstancedMesh(sourceMesh.geometry, material, count);
                const matrix = new THREE.Matrix4();
                const pos = new THREE.Vector3();
                const rot = new THREE.Euler();
                const scl = new THREE.Vector3();

                for (let i = 0; i < count; i++) {
                    pos.x = (Math.random() - 0.5) * MAP_SIZE;
                    pos.z = (Math.random() - 0.5) * MAP_SIZE;
                    pos.y = getHeight(pos.x, pos.z); // Snaps to hills

                    rot.y = Math.random() * Math.PI * 2;
                    
                    let s = 1.0;
                    if (isGrass) s = 0.4 + Math.random() * 0.6;
                    else if (isTree) s = 2.0 + Math.random() * 3.0; // Big trees
                    else s = 0.05 + Math.random() * 0.15; // Tiny rocks
                    
                    scl.set(s, s, s);
                    matrix.compose(pos, new THREE.Quaternion().setFromEuler(rot), scl);
                    instancedMesh.setMatrixAt(i, matrix);
                }
                scene.add(instancedMesh);
            });
        }

        // Initialize assets
        scatter("Grass", GRASS_COUNT, true);
        scatter("smallrocks", ROCK_COUNT, false);
        scatter("Tree", TREE_COUNT, false, true); // Assuming Tree.fbx exists

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        document.getElementById('status').innerText = "Vast World Loaded";
    </script>
</body>
</html>
